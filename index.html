<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/images/salepilot.png?v=2" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#002b6b">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/images/salepilot.png?v=2" sizes="180x180">
  <meta name="apple-mobile-web-app-title" content="SalePilot">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>SalePilot - POS & Inventory</title>
  <!-- SEO / social sharing. Client-rendered SPA: crawlers and WhatsApp/FB
       link previews see only these site-level tags (per-page OG needs SSR). -->
  <meta name="description"
    content="SalePilot — POS, inventory and a wholesale marketplace for growing businesses in Zambia. Retailers buy stock directly from wholesalers with live prices and pay on delivery.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="SalePilot">
  <meta property="og:title" content="SalePilot — POS, Inventory & Wholesale Marketplace">
  <meta property="og:description"
    content="Run your shop and buy stock at wholesale, directly from suppliers. Live stock, real prices, pay on delivery.">
  <meta property="og:image" content="/images/salepilot.png">
  <meta name="twitter:card" content="summary">
  <!-- Plus Jakarta Sans — app typeface -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <!-- Material Symbols Rounded (variable font) -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <!-- Lenco inline widget: sandbox on local dev, live everywhere else
       (mirrors the backend, which picks its Lenco API base per key type). -->
  <script>
    (function () {
      var s = document.createElement('script');
      var isLocal = /^(localhost|127\.|192\.168\.|10\.)/.test(window.location.hostname);
      s.src = isLocal
        ? 'https://pay.sandbox.lenco.co/js/v1/inline.js'
        : 'https://pay.lenco.co/js/v1/inline.js';
      document.head.appendChild(s);
    })();
  </script>

  <style>
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }
  </style>
  <!-- Apply the device/saved theme before first paint to avoid a flash -->
  <script>
    (function () {
      try {
        var pref = localStorage.getItem('themePreference');
        var system = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        var theme = (pref === 'light' || pref === 'dark') ? pref : system;
        var root = document.documentElement;
        root.classList.remove('light', 'dark');
        root.classList.add(theme);
        root.style.colorScheme = theme;
      } catch (e) { }
    })();
  </script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-background text-brand-text">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Unregister SW in development to prevent caching interfering with HMR
        const isDev = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

        /* 
        // TEMPORARILY DISABLED TO TEST PUSH NOTIFICATIONS IN DEV
        if (isDev) {
          navigator.serviceWorker.getRegistrations().then(registrations => {
            for (let registration of registrations) {
              registration.unregister();
              console.log('Service Worker unregistered for development');
            }
          });
          // Also clear caches to prevent ERR_CACHE_READ_FAILURE
          if ('caches' in window) {
            caches.keys().then(names => {
              for (let name of names) caches.delete(name);
              console.log('Caches cleared for development');
            });
          }
          return;
        }
        */

        navigator.serviceWorker.register('/sw.js?v=12').then(registration => {
          console.log('SW registered: ', registration);
        }).catch(registrationError => {
          console.log('SW registration failed: ', registrationError);
        });
      });
    }
  </script>
</body>

</html>
